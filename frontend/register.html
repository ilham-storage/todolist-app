<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — TodoApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { justify-content: center; align-items: center; padding: 0; }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-logo"> TodoApp</div>
    <p class="auth-sub">Buat akun baru untuk mulai</p>

    <div class="auth-card">
      <h2>Register</h2>

      <div class="field">
        <label>Nama</label>
        <input id="nama" type="text" placeholder="Masukkan nama kamu" autocomplete="off" />
      </div>

      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Buat password" />
      </div>

      <button class="btn-submit" onclick="register()">Buat Akun</button>
      <p id="message"></p>
    </div>

    <p class="auth-footer">
      Sudah punya akun? <a href="login.html">Login di sini</a>
    </p>
  </div>

  <script>
    const API = "http://localhost:3000";

    async function register() {
      const nama = document.getElementById("nama").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(API + "/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ nama, password })
        });

        const data = await res.json();

        if (!nama || !password) {
  document.getElementById("message").innerText = "Isi semua field";
  return;
}

        if (res.ok) {
          alert("Register berhasil!");

          // pindah ke login
          window.location.href = "login.html";
        } else {
          document.getElementById("message").innerText = data.message;
        }

      } catch (err) {
        document.getElementById("message").innerText = "Server error";
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") register();
    });
  </script>

</body>
</html>
